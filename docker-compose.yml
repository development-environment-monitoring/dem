services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dem-backend
    environment:
      PORT: "3026"
      DB_PATH: /app/data/dem.sqlite
    ports:
      - "3026:3026"
    volumes:
      - dem_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3026
    container_name: dem-frontend
    depends_on:
      - backend
    ports:
      - "3027:80"
    restart: unless-stopped

volumes:
  dem_data:
